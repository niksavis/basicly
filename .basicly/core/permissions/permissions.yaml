# Baseline agent-permissions deny-list, projected per target (basicly-u0zg).
#
# Each entry is a semantic guardrail; `claude` lists the native
# `permissions.deny` patterns Claude Code enforces at tool time. The list is
# authored here once and projected into every consumer's co-owned agent config
# by `basicly permissions-build`, so a consumer inherits the guardrail on
# install instead of only the dogfooding repo having it.
#
# Only Claude is projected here: a projected config-file deny is Claude-only.
# Copilot CLI has no config-file deny (deny is a session-scoped --deny-tool flag;
# github/copilot-cli#2398), and Codex forbids project-scope override of
# sandbox_mode / approval_policy by design. Their guardrails are therefore
# invocation-time only, tracked at the runner seam by basicly-lqz5 (copilot
# --deny-tool) and basicly-t0kt (codex --sandbox/-a).
deny:
  - id: destructive-rm
    description: block recursive force-remove of files
    claude:
      - "Bash(rm -rf*)"
      - "Bash(rm -fr*)"
      - "Bash(rm -r -f*)"
      - "Bash(rm -f -r*)"
  - id: force-push
    description: block force / lease-force pushes that rewrite remote history
    claude:
      - "Bash(git push --force*)"
      - "Bash(git push --force-with-lease*)"
      - "Bash(git push -f*)"
      - "Bash(git push*--force*)"
  - id: bypass-gates
    description: block skipping the commit/push gates (no-verify / no-gpg-sign)
    claude:
      - "Bash(git push*--no-verify*)"
      - "Bash(git push*--no-gpg-sign*)"
      - "Bash(git commit*--no-verify*)"
      - "Bash(git commit*--no-gpg-sign*)"
  - id: destructive-git
    description: block hard reset, force clean, and history rewrites
    claude:
      - "Bash(git reset --hard*)"
      - "Bash(git clean*-f*)"
      - "Bash(git filter-branch*)"
      - "Bash(git filter-repo*)"
  - id: env-read
    description: block reading dotenv secret files
    claude:
      - "Read(.env)"
      - "Read(.env.*)"
      - "Read(**/.env)"
      - "Read(**/.env.*)"
      - "Read(**/.env.local)"
  - id: env-edit
    description: block mutating dotenv secret files via any file-writing tool
    claude:
      # `Edit(path)` file-permission rules cover every Claude Code file-mutation
      # tool (Edit, Write, NotebookEdit), so `.env` cannot be created or
      # overwritten through any write path. Do not add Write(...)/NotebookEdit(...)
      # variants: they are not matched by file permission checks and are rejected
      # with a warning at startup.
      - "Edit(.env)"
      - "Edit(.env.*)"
      - "Edit(**/.env)"
      - "Edit(**/.env.*)"
