[paths]
# Managed core fragments shipped by basicly.
core_fragments = ".basicly/core/fragments"

# User-owned overlay fragment roots. These are never modified by `basicly install`.
overlay_fragments = [".basicly-local/fragments"]

# Engine assets and output manifest.
targets = ".basicly/core/targets"
templates = ".basicly/core/templates"
manifest = ".basicly/generated-manifest.json"

# Technology scoping (architecture §9): this repo's stack. Untagged catalog
# sources are universal and always ship; a technologies-tagged source ships only
# when its tag is listed here. basicly is a Python + Node repo (the CLI and the
# markdownlint hook), so it selects python and node; the wsl skill is authored
# but not selected here, staying available to repos that opt in.
[catalog]
technologies = ["python", "node"]

# Sibling git-worktree isolation for harness tracks.
[worktree]
# Branch new harness/<name> worktrees fork from. Empty = the current branch.
base_branch = ""
# Cap on how many worktrees may exist at once.
concurrency = 4

# Deterministic verify gate. Each check runs in the listed modes; a "staged"
# check with staged_suffix runs only against staged files of that suffix.
[[verify.checks]]
name = "ruff"
command = ["ruff", "check"]
modes = ["fast", "full", "staged"]
staged_suffix = ".py"

[[verify.checks]]
name = "ruff-format"
command = ["ruff", "format", "--check"]
modes = ["fast", "full", "staged"]
staged_suffix = ".py"

[[verify.checks]]
name = "pyright"
command = ["pyright"]
modes = ["fast", "full", "staged"]
staged_suffix = ".py"

[[verify.checks]]
name = "bandit"
command = ["bandit", "-q", "-c", "pyproject.toml", "-r", ".scripts", ".basicly/core/hooks"]
modes = ["fast", "full"]

[[verify.checks]]
name = "lint-imports"
# Enforces the import-linter engine-independence contract (.importlinter): the
# basicly engine must not import project-specific fragments/targets. Whole-tree
# analysis, so no staged variant.
command = ["lint-imports"]
modes = ["fast", "full"]

[[verify.checks]]
name = "pytest"
# -n auto (pytest-xdist) parallelizes the subprocess-heavy CLI tests across
# cores; on the multi-core CI runners this is the bulk of the gate's wall time.
command = ["pytest", "-q", "-n", "auto"]
modes = ["full"]

# Loop gate/checkpoint policy: which gates block advancement and the rework cap.
[policy]
# Gate names (from [verify] / br gate report) that MUST pass to advance. Any
# recorded gate not listed here is advisory (never blocks).
required_gates = ["verify"]
# Rework retries allowed before a node escalates to a human.
max_rework = 2

# Agent-agnostic runner: how the harness invokes a coding agent headless to do a
# node's work in its worktree. "auto" detects claude -> codex -> copilot on PATH,
# else falls back to the "manual" handoff (no command is guessed for an unknown
# agent). Add or override an agent with [[runner.agents]]; verify any command
# with `basicly runner dry-run` before a live run.
[runner]
# Manual in this repo: the loop is driven interactively by the agent itself, so
# auto-dispatching a second headless agent at build time would double-run it.
default = "manual"
