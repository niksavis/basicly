schema_version: 1
id: commands
description: Verbatim-runnable commands for everyday development.
category: commands
priority: high
applies_to: [all]
tags: [commands, build, test]
status: active
title: Commands
body: |
  Run these verbatim; don't improvise variants.

  Setup:

  ```sh
  uv sync --group dev
  uv run pre-commit install --install-hooks -t pre-commit -t commit-msg -t pre-push
  ```

  Test:

  ```sh
  uv run pytest -q
  ```

  Single test file:

  ```sh
  uv run pytest tests/test_cli.py -q
  ```

  Lint / format:

  ```sh
  uv run ruff check
  uv run ruff format --check
  ```

  Projection gates (after editing catalog sources):

  ```sh
  uv run basicly check
  uv run basicly skills-check --all-default-roots
  uv run basicly hooks-check
  ```
