config:
  default: true
  MD013: false
  MD024:
    siblings_only: true
  MD033: false
  MD041: false
  # MD060 (table-column-style) requires every table to stay internally
  # consistent with one pipe style; its default "any" still fires the moment a
  # single cell in an aligned table is edited without re-padding every other
  # pipe, and --fix will not re-pad the aligned style (basicly-jaz4). Disabled
  # so editing a wide table no longer forces a hand re-pad; existing aligned
  # tables stay readable and ragged edits lint clean.
  MD060: false
globs:
  - "**/*.md"
ignores:
  - ".venv/**"
  - "node_modules/**"
  # Generated projections are linted too (basicly-gdi): the generator emits
  # lint-clean markdown, so a violation in a projected file means a template
  # or catalog source regressed — fix it there and rebuild.
