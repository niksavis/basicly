config:
  default: true
  MD013: false
  MD024:
    siblings_only: true
  MD033: false
  MD041: false
globs:
  - "**/*.md"
ignores:
  - ".venv/**"
  - "node_modules/**"
  # Generated projections are generator-owned: their formatting is the
  # projector's contract (basicly build / skills-build), so linting them here
  # would make the gate fight the generator. Hand-authored markdown only.
  - "AGENTS.md"
  - ".claude/CLAUDE.md"
  - ".github/copilot-instructions.md"
  - ".claude/skills/**"
  - ".github/skills/**"
  - ".agents/skills/**"
  - ".claude/rules/**"
  - ".github/instructions/**"
