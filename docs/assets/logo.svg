  <rect x="112" y="10" width="7" height="5" rx="2" fill="#818cf8"/>
  <rect x="96" y="14" width="28" height="19" rx="6" fill="#818cf8"/>
  <rect x="101" y="91" width="7" height="5" rx="2" fill="#f59e0b"/>
  <rect x="112" y="91" width="7" height="5" rx="2" fill="#f59e0b"/>
  <rect x="96" y="95" width="28" height="19" rx="6" fill="#f59e0b"/>
  <rect x="9" y="91" width="7" height="5" rx="2" fill="#818cf8"/>
  <rect x="20" y="91" width="7" height="5" rx="2" fill="#818cf8"/>
  <rect x="4" y="95" width="28" height="19" rx="6" fill="#818cf8"/>
</svg>
