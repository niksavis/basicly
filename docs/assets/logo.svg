  <rect x="9" y="10" width="7" height="5" rx="2" fill="#6366f1"/>
  <rect x="20" y="10" width="7" height="5" rx="2" fill="#6366f1"/>
  <rect x="4" y="14" width="28" height="19" rx="6" fill="#6366f1"/>
