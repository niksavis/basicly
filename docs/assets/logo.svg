  <rect x="46" y="50" width="32" height="7" rx="3.5" fill="#a5b4fc"/>
  <rect x="52" y="62" width="26" height="7" rx="3.5" fill="#a5b4fc"/>
  <rect x="46" y="74" width="28" height="7" rx="3.5" fill="#a5b4fc"/>
