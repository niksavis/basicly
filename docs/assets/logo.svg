  <path d="M40 40 26 28M88 40 102 28M88 88 102 100M40 88 26 100" stroke="#64748b" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- The versioned YAML catalog: one big block, fragment lines inside. -->
