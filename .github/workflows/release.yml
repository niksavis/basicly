# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: release

"on":
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    name: Release quality gates
    if: |
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Install Python dependencies
        run: uv sync
      - name: Install Node dependencies
        run: npm install --no-fund --no-audit
      - name: Lint markdown
        run: npx --no-install markdownlint-cli2
      - name: Lint catalog sources
        run: uv run python -m basicly.cli catalog lint
      - name: Run pre-commit checks
        run: uv run python .basicly/core/hooks/pre-commit.py
      - name: Run pre-push checks
        run: uv run python .basicly/core/hooks/pre-push.py

  smoke-install:
    name: Fresh-repo install smoke test
    if: |
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: astral-sh/setup-uv@v7
      - name: Install from the tag into a fresh repo then check and uninstall
        shell: bash
        run: |
          repo="https://github.com/${GITHUB_REPOSITORY}"
          tag="${GITHUB_REF_NAME}"
          mkdir smoke && cd smoke
          git init -q
          git config user.email ci@example.invalid
          git config user.name ci
          uvx --from "git+${repo}@${tag}" basicly install
          uvx --from "git+${repo}@${tag}" basicly check
          uvx --from "git+${repo}@${tag}" basicly uninstall

  release:
    name: Publish GitHub release
    needs: [verify, smoke-install]
    if: |
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve tag name
        id: resolve_tag
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            tag_name="${GITHUB_REF_NAME}"
          fi
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag is available locally
        shell: bash
        run: |
          tag_name='${{ steps.resolve_tag.outputs.tag_name }}'
          git fetch --force --tags origin
          git rev-parse "${tag_name}" >/dev/null

      - name: Verify tag matches package version
        shell: bash
        run: |
          tag_name='${{ steps.resolve_tag.outputs.tag_name }}'
          pkg_version="$(python3 -c "
          import re, pathlib
          text = pathlib.Path('src/basicly/__init__.py').read_text()
          print(re.search(r'__version__ = \"([^\"]+)\"', text).group(1))
          ")"
          if [ "v${pkg_version}" != "${tag_name}" ]; then
            echo "Tag ${tag_name} does not match package version ${pkg_version};" \
              "bump src/basicly/__init__.py before tagging" >&2
            exit 1
          fi

      - name: Generate release notes from changelog
        shell: bash
        run: |
          tag_name='${{ steps.resolve_tag.outputs.tag_name }}'

          if [ ! -f CHANGELOG.md ]; then
            echo "CHANGELOG.md not found; cannot create release notes" >&2
            exit 1
          fi

          awk -v tag="${tag_name}" '
            BEGIN { in_section=0; found=0 }
            $1 == "##" && $2 == tag && $3 == "-" {
              if ($4 !~ /^[0-9]{4}-[0-9]{2}-[0-9]{2}$/) {
                print "Release heading for " tag " must include ISO date: ## " tag " - YYYY-MM-DD" > "/dev/stderr"
                exit 2
              }
              in_section=1
              found=1
            }
            in_section && $1 == "##" && $2 != tag {
              exit
            }
            in_section {
              print
            }
            END {
              if (!found) {
                print "No changelog section found for " tag " in CHANGELOG.md" > "/dev/stderr"
                exit 1
              }
            }
          ' CHANGELOG.md > release-section.md

          cp release-section.md release-notes.md

          # Append a copy-paste install command pinned to this tag, so every
          # release page shows how to install exactly this version (basicly-vwlm).
          repo_url="https://github.com/${GITHUB_REPOSITORY}"
          {
            printf '\n## Install\n\n'
            printf '```sh\n'
            printf 'uvx --from git+%s@%s basicly install\n' "${repo_url}" "${tag_name}"
            printf '```\n'
          } >> release-notes.md

      - uses: astral-sh/setup-uv@v7

      - name: Build distribution artifacts
        run: uv build

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag_name }}
          name: ${{ steps.resolve_tag.outputs.tag_name }}
          body_path: release-notes.md
          # Upload only the real build artifacts; a bare dist/* also sweeps up
          # the 1-byte scratch .gitignore uv writes into the output dir.
          files: |
            dist/*.whl
            dist/*.tar.gz
