# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: quality-gates

# Tracker-only pushes (.beads/**) skip CI: the harness loop necessarily commits
# beads state separately from the work (basicly-flp), and the local commit-msg
# hooks are the deterministic floor for those commits.
"on":
  push:
    branches: [main]
    paths-ignore:
      - ".beads/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - ".beads/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  commit-messages:
    name: Commit messages (conventional + beads id)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Validate conventional commit messages
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
            range="${base_sha}..${head_sha}"
          else
            before_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
            if [ -z "${before_sha}" ] || [ "${before_sha}" = "0000000000000000000000000000000000000000" ]; then
              range="${head_sha}"
            else
              range="${before_sha}..${head_sha}"
            fi
          fi

          echo "Checking commit messages in range: ${range}"

          failed=0
          count=0
          while IFS= read -r commit_sha; do
            if [ -z "${commit_sha}" ]; then
              continue
            fi

            count=$((count + 1))
            subject="$(git log -1 --format='%s' "${commit_sha}")"
            # Validate the FULL message (subject + body), matching the local
            # commit-msg hooks: the beads issue id is a trailing body line by
            # convention (and dotted child ids can't live in the subject), so a
            # subject-only check would spuriously fail it.
            msg_file="$(mktemp)"
            git log -1 --format='%B' "${commit_sha}" > "${msg_file}"

            if ! uv run python .basicly/core/hooks/commit-msg.py "${msg_file}"; then
              echo "Invalid commit message in ${commit_sha}: ${subject}" >&2
              failed=1
            fi

            if ! uv run python .basicly/core/hooks/beads-commit-msg.py "${msg_file}"; then
              echo "Missing/unknown beads issue id in ${commit_sha}: ${subject}" >&2
              failed=1
            fi

            rm -f "${msg_file}"
          done < <(git log --format='%H' "${range}")

          if [ "${count}" -eq 0 ]; then
            echo "No commits to validate."
          fi

          exit "${failed}"

  quality-gates:
    name: Quality gates on ${{ matrix.os }}
    needs: commit-messages
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Python dependencies
        run: uv sync
      - name: Install Node dependencies
        run: npm install --no-fund --no-audit
      - name: Lint markdown
        run: npx --no-install markdownlint-cli2
      - name: Lint catalog sources
        run: uv run python -m basicly.cli catalog lint
      # Only the full (pre-push) gate runs: it is a superset of the fast
      # (pre-commit) checks — ruff, format, pyright, bandit — plus pytest, so
      # running pre-commit too just repeated that work (basicly-5uo6).
      - name: Run full checks (ruff, format, pyright, bandit, pytest)
        run: uv run python .basicly/core/hooks/pre-push.py
