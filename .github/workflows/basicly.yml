name: basicly

# Tracker-only pushes (.beads/**) skip CI: the harness loop necessarily commits
# beads state separately from the work (basicly-flp), and the local commit-msg
# hooks are the deterministic floor for those commits.
on:
  push:
    branches: [main]
    paths-ignore:
      - ".beads/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - ".beads/**"

jobs:
  check:
    name: Projection drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: PYTHONPATH=src uv run python -m basicly.cli check
