repos:
- repo: local
  hooks:
  - id: identity-guard
    name: identity-guard
    entry: uv run python .basicly/core/hooks/identity-guard.py
    language: system
    stages:
    - pre-commit
    pass_filenames: false
    always_run: true
  - id: pre-commit-script
    name: pre-commit-script
    entry: uv run python .basicly/core/hooks/pre-commit.py
    language: system
    stages:
    - pre-commit
    pass_filenames: false
    always_run: true
  - id: catalog-lint
    name: catalog-lint
    entry: uv run python .basicly/core/hooks/catalog-lint.py
    language: system
    stages:
    - pre-commit
    pass_filenames: false
    always_run: true
  - id: secret-scan
    name: secret-scan
    entry: uv run python .basicly/core/hooks/secret-scan.py
    language: system
    stages:
    - pre-commit
    pass_filenames: false
    always_run: true
  - id: commit-msg-script
    name: commit-msg-script
    entry: uv run python .basicly/core/hooks/commit-msg.py
    language: system
    stages:
    - commit-msg
    pass_filenames: true
  - id: beads-commit-msg-script
    name: beads-commit-msg-script
    entry: uv run python .basicly/core/hooks/beads-commit-msg.py
    language: system
    stages:
    - commit-msg
    pass_filenames: true
  - id: pre-push-script
    name: pre-push-script
    entry: uv run python .basicly/core/hooks/pre-push.py
    language: system
    stages:
    - pre-push
    pass_filenames: false
    always_run: true
  - id: markdownlint
    name: markdownlint
    # Repo-wide run through .markdownlint-cli2.yaml (globs + generated-file
    # ignores) instead of staged filenames, so explicit paths can't bypass the
    # config's ignore list. npx resolves the local devDependency.
    entry: npx --no-install markdownlint-cli2
    language: system
    stages:
    - pre-commit
    pass_filenames: false
    files: \.md$
